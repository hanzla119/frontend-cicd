name: Frontend CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        # We keep CI=true here so tests run once and don't watch files
        env:
          CI: true
        run: npm test

      - name: Build Project
        # We set CI=false here to prevent warnings from failing the build
        env:
          CI: false
        run: npm run build