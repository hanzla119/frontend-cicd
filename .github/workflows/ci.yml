name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Set permissions for GitHub Actions to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent duplicate deployment runs from interfering with each other
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 1. Continuous Integration (CI) Job: Install, Test, and Build
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        env:
          CI: true
        run: npm test

      - name: Build Project
        env:
          CI: false
        run: npm run build

      - name: Upload Pages Artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

  # 2. Continuous Deployment (CD) Job: Deploy compiled files to GitHub Pages
  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4