name: Frontend CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'  # Downgraded to Node 16 to support older react-scripts natively

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        env:
          CI: true
        run: npm test

      - name: Build Project
        env:
          CI: false
        run: npm run build